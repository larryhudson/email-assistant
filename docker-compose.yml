services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: email_agent
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: email_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U email_agent"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
